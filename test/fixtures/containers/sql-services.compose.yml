services:
  postgres:
    profiles: [postgres, sql, all]
    image: docker.io/library/postgres:16-alpine
    ports:
      - '${ORCAQ_POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: '${ORCAQ_POSTGRES_DATABASE:-pagila}'
      POSTGRES_USER: '${ORCAQ_POSTGRES_USER:-orcaq}'
      POSTGRES_PASSWORD: '${ORCAQ_POSTGRES_PASSWORD:-orcaq}'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql-init/postgres/00-bootstrap.sh:/docker-entrypoint-initdb.d/00-bootstrap.sh:ro
      - ../datasets/postgres/postgres-sakila-schema.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
      - ../datasets/postgres/postgres-sakila-insert-data-optimized.sql:/docker-entrypoint-initdb.d/20-data.sql:ro
      - ./sql-init/postgres/99-grants.sh:/docker-entrypoint-initdb.d/99-grants.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 20

  mysql:
    profiles: [mysql, sql, all]
    image: docker.io/library/mysql:8.4
    ports:
      - '${ORCAQ_MYSQL_PORT:-3306}:3306'
    environment:
      MYSQL_DATABASE: '${ORCAQ_MYSQL_DATABASE:-sakila}'
      MYSQL_USER: '${ORCAQ_MYSQL_USER:-orcaq}'
      MYSQL_PASSWORD: '${ORCAQ_MYSQL_PASSWORD:-orcaq}'
      MYSQL_ROOT_PASSWORD: '${ORCAQ_MYSQL_ROOT_PASSWORD:-root}'
    volumes:
      - mysql-data:/var/lib/mysql
      - ../datasets/mysql/mysql-sakila-schema.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
      - ../datasets/mysql/mysql-sakila-insert-data-optimized.sql:/docker-entrypoint-initdb.d/20-data.sql:ro
      - ./sql-init/mysql/99-grants.sh:/docker-entrypoint-initdb.d/99-grants.sh:ro
    command:
      - '--mysql-native-password=ON'
      - '--mysqlx=0'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent',
        ]
      interval: 5s
      timeout: 5s
      retries: 30

  mariadb:
    profiles: [mariadb, sql, all]
    image: docker.io/library/mariadb:11.4
    ports:
      - '${ORCAQ_MARIADB_PORT:-3307}:3306'
    environment:
      MARIADB_DATABASE: '${ORCAQ_MARIADB_DATABASE:-sakila}'
      MARIADB_USER: '${ORCAQ_MARIADB_USER:-orcaq}'
      MARIADB_PASSWORD: '${ORCAQ_MARIADB_PASSWORD:-orcaq}'
      MARIADB_ROOT_PASSWORD: '${ORCAQ_MARIADB_ROOT_PASSWORD:-root}'
    volumes:
      - mariadb-data:/var/lib/mysql
      - ../datasets/mysql/mysql-sakila-schema.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
      - ../datasets/mysql/mysql-sakila-insert-data-optimized.sql:/docker-entrypoint-initdb.d/20-data.sql:ro
      - ./sql-init/mysql/99-grants.sh:/docker-entrypoint-initdb.d/99-grants.sh:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mariadb-admin ping -h 127.0.0.1 -u$$MARIADB_USER -p$$MARIADB_PASSWORD --silent',
        ]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  postgres-data:
  mysql-data:
  mariadb-data:
