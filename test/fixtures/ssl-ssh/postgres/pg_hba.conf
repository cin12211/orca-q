# Force SSL for all TCP connections. Only "hostssl" lines exist for TCP,
# so a non-SSL TCP client is rejected — this proves SSL is required.
# Local unix-socket access stays trusted for container init/healthcheck.
local   all   all                 trust
hostssl all   all   0.0.0.0/0     scram-sha-256
hostssl all   all   ::/0          scram-sha-256
