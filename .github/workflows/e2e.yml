        with:
          name: app-build-${{ github.sha }}
          path: .output/

      - name: Prepare SQLite fixture
        run: bash scripts/test-services/start-fixtures.sh --profile sqlite

      - name: Run E2E — SQLite
        run: bunx playwright test --project sqlite

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-sqlite-${{ github.sha }}
          path: |
            playwright-report/
            test-results/playwright/
