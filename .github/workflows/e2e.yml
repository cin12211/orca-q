name: E2E Tests

on:
  workflow_call:

permissions:
  contents: read

env:
  BUN_VERSION: 1.2.8

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Build the app once — all E2E jobs download this artifact
  # ───────────────────────────────────────────────────────────────────────────
  e2e-build:
    name: Build app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Restore Bun install cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-ignore-scripts-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-ignore-scripts-

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build app
        run: bun run nuxt:build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build-${{ github.sha }}
          path: .output
          retention-days: 1
          if-no-files-found: error
          include-hidden-files: true

  # ───────────────────────────────────────────────────────────────────────────
  # E2E jobs — each starts ONLY the fixtures it needs
  # ───────────────────────────────────────────────────────────────────────────

  e2e-common:
    name: E2E — common (all fixtures)
    runs-on: ubuntu-latest
    needs: e2e-build
    timeout-minutes: 30

    env:
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      PLAYWRIGHT_WEB_SERVER_COMMAND: node .output/server/index.mjs
      PLAYWRIGHT_WORKERS: 1
      CI: true
      ORCAQ_POSTGRES_PORT: 5432
      ORCAQ_POSTGRES_DATABASE: pagila
      ORCAQ_POSTGRES_USER: orcaq
      ORCAQ_POSTGRES_PASSWORD: orcaq
      ORCAQ_MYSQL_PORT: 3306
      ORCAQ_MYSQL_DATABASE: sakila
      ORCAQ_MYSQL_USER: orcaq
      ORCAQ_MYSQL_PASSWORD: orcaq
      ORCAQ_MYSQL_ROOT_PASSWORD: root
      ORCAQ_MARIADB_PORT: 3307
      ORCAQ_MARIADB_DATABASE: sakila
      ORCAQ_MARIADB_USER: orcaq
      ORCAQ_MARIADB_PASSWORD: orcaq
      ORCAQ_MARIADB_ROOT_PASSWORD: root
      ORCAQ_REDIS_PORT: 6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Restore Bun install cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-ignore-scripts-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-ignore-scripts-

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build-${{ github.sha }}
          path: .output/

      - name: Start all fixtures
        run: bash scripts/test-services/start-fixtures.sh --profile all

      - name: Run E2E — common
        run: bunx playwright test --project common

      - name: Stop fixtures
        if: always()
        run: bash scripts/test-services/stop-fixtures.sh --profile all

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-common-${{ github.sha }}
          path: |
            playwright-report/
            test-results/playwright/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────

  e2e-sqlite:
    name: E2E — SQLite (no docker)
